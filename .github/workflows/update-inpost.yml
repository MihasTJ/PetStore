name: Update InPost paczkomat data

on:
  schedule:
    - cron: '0 3 * * 0'  # Co niedzielę o 03:00 UTC
  workflow_dispatch:       # Ręczne uruchomienie z panelu GitHub Actions

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download InPost paczkomat data
        env:
          INPOST_TOKEN: ${{ secrets.INPOST_TOKEN }}
        run: node scripts/download-inpost.mjs

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lib/data/inpost-points.json
          if git diff --cached --quiet; then
            echo "Brak zmian w danych — pomijam commit"
          else
            git commit -m "chore: update InPost paczkomat data [skip ci]"
            git push
          fi
